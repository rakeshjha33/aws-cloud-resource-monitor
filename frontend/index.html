<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Cloud Resource Control Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center border-b border-slate-700 pb-6 mb-8">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-emerald-400">AWS Resource Tracker</h1>
                <p class="text-sm text-slate-400 mt-1">Real-time infrastructure control panel</p>
            </div>
            <div class="text-right">
                <span id="last-updated" class="text-xs bg-slate-800 px-3 py-1.5 rounded-full border border-slate-700 text-slate-300">Last updated: Fetching...</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h3 class="text-xs font-semibold tracking-wider uppercase text-slate-400">EC2 Instances</h3>
                <p id="ec2-count" class="text-4xl font-black mt-2 text-white">0</p>
            </div>
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h3 class="text-xs font-semibold tracking-wider uppercase text-slate-400">S3 Buckets</h3>
                <p id="s3-count" class="text-4xl font-black mt-2 text-white">0</p>
            </div>
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h3 class="text-xs font-semibold tracking-wider uppercase text-slate-400">Lambda Functions</h3>
                <p id="lambda-count" class="text-4xl font-black mt-2 text-white">0</p>
            </div>
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h3 class="text-xs font-semibold tracking-wider uppercase text-slate-400">IAM Users</h3>
                <p id="iam-count" class="text-4xl font-black mt-2 text-white">0</p>
            </div>
        </div>

        <div class="bg-slate-800 rounded-xl border border-slate-700 p-6">
            <h2 class="text-xl font-bold mb-4 text-emerald-400">System Inventory</h2>
            <div id="inventory-lists" class="space-y-6">
                <p class="text-slate-400 text-sm">Loading dynamic inventory records...</p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
